name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux exercises the Unix job-control path (job.rs); Windows exercises
        # the foreground-only fallback.
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Add Git's usr/bin to PATH (Windows coreutils the test suite runs against)
        if: runner.os == 'Windows'
        run: echo "C:\Program Files\Git\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Debug PATH (temporary)
        if: runner.os == 'Windows'
        run: |
          Test-Path "C:\Program Files\Git\usr\bin\cat.exe"
          Get-Command cat -ErrorAction SilentlyContinue
          $env:Path -split ';'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

  clippy:
    name: clippy (Linux, includes job.rs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets
