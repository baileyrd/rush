# cargo-deny configuration — supply-chain hygiene for a dependency graph
# that includes four git-pinned sibling crates (rusty_regx, rusty_lines,
# rusty_libc, rusty_win32), all from the same author as rush itself. Run
# locally with `cargo deny check`, or see .github/workflows/ci.yml for the
# CI job.
#
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "aarch64-apple-darwin" },
]
# criterion (benches/shell_bench.rs, dev-only — never shipped in the
# actual rush binary) pulls in `regex` transitively, which the [bans]
# `deny` list below bans for the *product* dependency graph (the `=~`
# engine swap, C56). Excluded here rather than dropping the ban, since
# the ban's whole point is that rush's own shipped code never
# reintroduces `regex` — a benchmark harness dependency doing so isn't
# the same risk.
exclude = ["criterion"]

[advisories]
# Fail the build on a known security advisory (RUSTSEC) for anything in
# the dependency graph, including transitive deps of the sibling crates.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"

[licenses]
# rush itself is MIT (Cargo.toml). Allow the licenses actually present in
# the graph today (MIT, Apache-2.0) plus a couple of common permissive
# ones likely to show up as the dependency graph grows; anything else
# fails the build rather than silently shipping an unreviewed license.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
# Multiple versions of the same crate in the graph aren't an error by
# default (common and often unavoidable with git deps), just surfaced —
# tighten to "deny" once the graph is small enough to keep at exactly one
# version per crate.
multiple-versions = "warn"
# rush's own sibling crates (rusty_regx, rusty_lines, rusty_libc,
# rusty_win32, all first-party, same author, see Cargo.toml's own comments
# on each) are
# deliberate git dependencies with no crates.io `version =` requirement —
# exactly what this lint flags as a "wildcard" dependency, but here it's
# the intended architecture (actively co-developed alongside rush itself,
# rusty_regx additionally pinned to an exact `rev`), not an accidental
# unconstrained version bound. Left as "allow"; `[sources]` below is what
# actually constrains *which* git sources are trusted.
wildcards = "allow"
# A crate rush deliberately dropped and never wants back (the `=~` engine
# swap, C56 — see CHANGELOG.md "Changed: `=~` regex engine replaced").
deny = [
    { name = "regex" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# The sibling crates this project pulls straight from GitHub instead of
# crates.io (see Cargo.toml's own comments on each) — anything else over
# git is unreviewed and should fail the build until it's added here
# deliberately.
allow-git = [
    "https://github.com/baileyrd/rusty_regx",
    "https://github.com/baileyrd/rusty_lines",
    "https://github.com/baileyrd/rusty_libc",
    "https://github.com/baileyrd/rusty_win32",
]
