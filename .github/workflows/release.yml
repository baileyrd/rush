name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  windows-artifact:
    name: Build & attach Windows release asset
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Package zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $asset = "rush-$version-win-x64.zip"
          Copy-Item LICENSE target/release/LICENSE
          Compress-Archive -Path target/release/rush.exe, target/release/LICENSE -DestinationPath $asset
          echo "ASSET_PATH=$asset" >> $env:GITHUB_ENV

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_PATH }}
          generate_release_notes: true

  linux-artifact:
    # Linux is rush's primary development/test platform (CI's own `test`
    # job matrix), but until now a tagged release produced no binary for
    # it at all — only the Windows job above.
    name: Build & attach Linux release asset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Package tarball
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          staging="rush-$version-linux-x86_64"
          asset="$staging.tar.gz"
          mkdir "$staging"
          cp target/release/rush LICENSE "$staging"/
          [ -f docs/rush.1 ] && cp docs/rush.1 "$staging"/
          [ -d completions ] && cp -r completions "$staging"/
          tar czf "$asset" "$staging"
          echo "ASSET_PATH=$asset" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_PATH }}
          generate_release_notes: true

  macos-artifact:
    name: Build & attach macOS release asset (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (the modern default GitHub-hosted macOS runner).
          - os: macos-latest
            arch: arm64
          # Intel — a separate runner image, not just a --target flag,
          # since libc-crate-backed macOS builds (Cargo.toml: rusty_libc
          # is Linux-only) link against the host's own libSystem.
          - os: macos-13
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Package tarball
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          staging="rush-$version-macos-${{ matrix.arch }}"
          asset="$staging.tar.gz"
          mkdir "$staging"
          cp target/release/rush LICENSE "$staging"/
          [ -f docs/rush.1 ] && cp docs/rush.1 "$staging"/
          [ -d completions ] && cp -r completions "$staging"/
          tar czf "$asset" "$staging"
          echo "ASSET_PATH=$asset" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_PATH }}
          generate_release_notes: true
