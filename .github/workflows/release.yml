name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  windows-artifact:
    name: Build & attach Windows release asset
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Package zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $asset = "rush-$version-win-x64.zip"
          Copy-Item LICENSE target/release/LICENSE
          Compress-Archive -Path target/release/rush.exe, target/release/LICENSE -DestinationPath $asset
          echo "ASSET_PATH=$asset" >> $env:GITHUB_ENV

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_PATH }}
          generate_release_notes: true
