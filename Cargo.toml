[package]
name = "rush"
version = "0.1.1"
edition = "2024"
license = "MIT"
description = "A small, bash-compatible shell written in Rust"
repository = "https://github.com/baileyrd/rush"

[dependencies]
# `[[ $s =~ regex ]]` (C56). A minimal POSIX-ERE engine (parser + Pike VM,
# linear-time, zero deps) built to replace the `regex` crate here; v1 keeps
# the crate's leftmost-first semantics, differentially tested against it.
rusty_regx = { git = "https://github.com/baileyrd/rusty_regx", branch = "main" }
# The line editor (formerly src/editor.rs, extracted to its own crate):
# raw-mode terminal, emacs + vi keymaps, kill ring, undo, history search,
# bracketed paste, $RPS1 right prompt. rush drives it through its `Hooks`
# trait (completion, hints, highlighting, abbreviations, vi-mode flag).
rusty_lines = { git = "https://github.com/baileyrd/rusty_lines", branch = "main", default-features = false }

# Job control (process groups, terminal hand-off, signals) is Unix-only. The
# whole syscall surface goes through the `sys` facade, so both backends are
# optional dependencies selected by the features below.
[target.'cfg(unix)'.dependencies]
# Default backend. Optional so `--no-default-features --features rusty-libc`
# links no libc at all.
libc = { version = "0.2", optional = true }
# Alternative backend (Linux only): the hand-rolled raw-syscall crate.
rusty_libc = { git = "https://github.com/baileyrd/rusty_libc", branch = "main", optional = true }

# The integration tests drive the built binary and also make a few syscalls of
# their own, so they always need libc regardless of which backend is selected.
[target.'cfg(unix)'.dev-dependencies]
libc = "0.2"

[features]
# The default: rush's `sys` facade — and the line editor's — are backed by the
# `libc` crate.
default = ["libc-backend"]
libc-backend = ["dep:libc", "rusty_lines/libc-backend"]
# Back the syscall surface with the hand-rolled rusty_libc crate instead (Linux
# only), and select the line editor's matching backend. With
# `--no-default-features --features rusty-libc`, no `libc` is linked anywhere.
# When both are enabled, rusty-libc wins.
rusty-libc = ["dep:rusty_libc", "rusty_lines/rusty-libc"]
